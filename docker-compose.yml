services:
  gateway:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./private:/app/private:ro     # the sweep xprv (read-only into the container)
      - ./data:/app/data              # sqlite db persists here
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Optional admin dashboard on a separate port.
  admin:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "admin.app"]
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - ./private:/app/private:ro
      - ./data:/app/data
    depends_on:
      - gateway
