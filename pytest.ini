# Pytest configuration for the Optimus Payment Gateway test-suite.
#
#   cd "Optimus Payment Gateway"
#   pip install -r requirements.txt      # bip-utils + eth-account are the only test deps
#   pip install pytest
#   pytest                               # runs everything under tests/
#
# Only tests/ is collected — the examples/ folder pulls in optional extras
# (python-telegram-bot, flask) that the core test-suite must not require.
[pytest]
testpaths = tests
addopts = -q
